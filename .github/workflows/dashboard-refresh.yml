name: Dashboard refresh

# Refresca el Centro de Control (secreto/analytics/data.json) 4x/día.
# Baja GA4 + Clarity + /api/sb + análisis IA, y commitea el data.json
# (el push dispara el deploy de Pages automáticamente).
#
# Requiere estos Secrets del repo (Settings → Secrets and variables → Actions):
#   GA4_PROPERTY_ID, GOOGLE_SERVICE_ACCOUNT_JSON (el .json entero),
#   CLARITY_EXPORT_TOKEN_ACCESOIA, CLARITY_EXPORT_TOKEN_GAMBETA, ANTHROPIC_API_KEY

on:
  schedule:
    - cron: '0 3,9,15,21 * * *'   # 4x/día (UTC) — ~00,06,12,18 hora Argentina
  workflow_dispatch:              # permite correrlo a mano desde la pestaña Actions

concurrency:
  group: dashboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refrescar data.json
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CLARITY_EXPORT_TOKEN_ACCESOIA: ${{ secrets.CLARITY_EXPORT_TOKEN_ACCESOIA }}
          CLARITY_EXPORT_TOKEN_GAMBETA: ${{ secrets.CLARITY_EXPORT_TOKEN_GAMBETA }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/dashboard-refresh.mjs

      - name: Commit y push si cambió
        run: |
          git config user.name "gambeta-bot"
          git config user.email "bot@gambeta.ai"
          if [ -n "$(git status --porcelain secreto/analytics/data.json)" ]; then
            git add secreto/analytics/data.json
            git commit -m "chore(dashboard): refresh automático de data.json"
            git push
          else
            echo "Sin cambios en data.json"
          fi
