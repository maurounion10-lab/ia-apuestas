name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Init TWA project
        run: |
          mkdir -p twa-build && cd twa-build
          printf 'n\n/opt/hostedtoolcache/Java_Temurin_jdk/17*/x64\n' | \
          bubblewrap init --manifest https://gambeta.ai/manifest.json --skipPwaValidation 2>&1 | head -80 || true
      - name: Override twa-manifest
        run: |
          mkdir -p twa-build
          cat > twa-build/twa-manifest.json << 'JSONEOF'
          {
            "packageId": "ai.gambeta.app",
            "host": "gambeta.ai",
            "name": "gambeta.ai",
            "launcherName": "gambeta.ai",
            "display": "standalone",
            "themeColor": "#00c853",
            "navigationColor": "#0a0f0a",
            "navigationColorDark": "#0a0f0a",
            "backgroundColor": "#0a0f0a",
            "startUrl": "/",
            "iconUrl": "https://gambeta.ai/favicon-512.png",
            "maskableIconUrl": "https://gambeta.ai/favicon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {"path": "../android.keystore", "alias": "gambeta"},
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "orientation": "portrait",
            "enableNotifications": false,
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://gambeta.ai/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://gambeta.ai/",
            "fingerprints": []
          }
          JSONEOF
      - name: Debug init output
        run: |
          echo "=== twa-build/ ==="
          ls -la twa-build/ 2>/dev/null || echo "(empty)"
          echo "=== app/build.gradle (first 80 lines) ==="
          head -80 twa-build/app/build.gradle 2>/dev/null || echo "(not found)"
          echo "=== JAVA_HOME ==="
          echo "${JAVA_HOME}"
          echo "=== ANDROID_HOME ==="
          echo "${ANDROID_HOME:-/usr/local/lib/android/sdk}"
      - name: Setup Android SDK for Gradle
        run: |
          ANDROID_SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "sdk.dir=${ANDROID_SDK}" > twa-build/local.properties
          chmod +x twa-build/gradlew 2>/dev/null || true
          echo "local.properties set to sdk.dir=${ANDROID_SDK}"
      - name: Build APK with Gradle
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
