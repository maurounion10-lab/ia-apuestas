name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Setup Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>&1 | tail -5
      - name: Patch bubblewrap validatePath
        run: |
          python3 << 'PYEOF'
          import subprocess, glob, re

          npm_root = subprocess.check_output(['npm', 'root', '-g']).decode().strip()
          sdk_files = glob.glob(f"{npm_root}/@bubblewrap/**/*AndroidSdkTools.js", recursive=True)
          for sdk_js in sdk_files:
              with open(sdk_js) as f:
                  content = f.read()
              m = re.search(r'static async validatePath\s*\((\w+)\)\s*\{', content)
              if m:
                  param = m.group(1)
                  bp = m.end() - 1
                  content = content[:bp+1] + f'\n        return Result_1.Result.ok({param}); // PATCHED' + content[bp+1:]
                  with open(sdk_js, 'w') as f:
                      f.write(content)
                  print(f"PATCH OK: validatePath({param}) bypassed")
              else:
                  print("PATCH WARN: validatePath not found")
          PYEOF
      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          echo "Config: $(cat ~/.bubblewrap/config.json)"
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          printf '%s' '{"packageId":"ai.gambeta.app","host":"gambeta.ai","name":"gambeta.ai","launcherName":"gambeta.ai","display":"standalone","themeColor":"#00c853","navigationColor":"#0a0f0a","navigationColorDark":"#0a0f0a","backgroundColor":"#0a0f0a","startUrl":"/","iconUrl":"https://gambeta.ai/favicon-512.png","maskableIconUrl":"https://gambeta.ai/favicon-512.png","splashScreenFadeOutDuration":300,"signingKey":{"path":"../android.keystore","alias":"gambeta"},"minSdkVersion":21,"targetSdkVersion":34,"appVersion":"1.0.0","appVersionCode":1,"orientation":"portrait","enableNotifications":false,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://gambeta.ai/manifest.json","fallbackType":"customtabs","features":{},"alphaDependencies":{"enabled":false},"enableSiteSettingsShortcut":true,"isChromeOSOnly":false,"isMetaQuest":false,"fullScopeUrl":"https://gambeta.ai/","fingerprints":[]}' > twa-build/twa-manifest.json
      - name: Build APK via PTY runner
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          python3 << 'PYEOF'
          import os
          runner = r'''
import pty, os, sys, select, time

def main():
    store_pass = os.environ.get('BUBBLEWRAP_KEYSTORE_PASSWORD', '').encode()
    key_pass = os.environ.get('BUBBLEWRAP_KEY_PASSWORD', '').encode()
    master_fd, slave_fd = pty.openpty()
    pid = os.fork()
    if pid == 0:
        os.setsid()
        os.dup2(slave_fd, 0)
        os.dup2(slave_fd, 1)
        os.dup2(slave_fd, 2)
        os.close(master_fd)
        os.close(slave_fd)
        os.execvp('bubblewrap', ['bubblewrap', 'build', '--skipPwaValidation'])
        sys.exit(1)
    os.close(slave_fd)
    buf = b''
    pass_count = [0]
    while True:
        try:
            r, _, _ = select.select([master_fd], [], [], 2.0)
        except Exception:
            break
        if r:
            try:
                data = os.read(master_fd, 4096)
                if not data:
                    break
                sys.stdout.buffer.write(data)
                sys.stdout.buffer.flush()
                buf += data
                if b'(Y/n)' in buf or b'(y/N)' in buf or b'[Y/n]' in buf:
                    print('\n[PTY] Auto-answering Y to prompt')
                    os.write(master_fd, b'y\r\n')
                    buf = b''
                elif b'assword' in buf and b':' in buf:
                    pass_count[0] += 1
                    pw = store_pass if pass_count[0] == 1 else key_pass
                    print(f'\n[PTY] Auto-answering password #{pass_count[0]}')
                    os.write(master_fd, pw + b'\r\n')
                    buf = b''
            except OSError:
                break
        try:
            wpid, status = os.waitpid(pid, os.WNOHANG)
            if wpid == pid:
                code = os.WEXITSTATUS(status) if os.WIFEXITED(status) else 1
                print(f'\n[PTY] Process exited with code {code}')
                sys.exit(code)
        except Exception:
            break
    try:
        _, status = os.waitpid(pid, 0)
        code = os.WEXITSTATUS(status) if os.WIFEXITED(status) else 1
        print(f'\n[PTY] Final exit code: {code}')
        sys.exit(code)
    except Exception:
        pass

main()
'''
          with open('/tmp/pty_runner.py', 'w') as f:
              f.write(runner)
          PYEOF
          python3 /tmp/pty_runner.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
