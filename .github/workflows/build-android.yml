name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Setup Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>&1 | tail -5
      - name: Patch bubblewrap (validatePath + checksum prompt)
        run: |
          python3 << 'PYEOF'
          import subprocess, glob, re

          npm_root = subprocess.check_output(['npm', 'root', '-g']).decode().strip()
          print(f"npm root: {npm_root}")

          # === PATCH 1: validatePath in AndroidSdkTools.js ===
          sdk_files = glob.glob(f"{npm_root}/@bubblewrap/**/*AndroidSdkTools.js", recursive=True)
          for sdk_js in sdk_files:
              with open(sdk_js) as f:
                  content = f.read()
              match = re.search(r'static async validatePath\s*\((\w+)\)\s*\{', content)
              if match:
                  param = match.group(1)
                  brace_pos = match.end() - 1
                  early = f'\n        return Result_1.Result.ok({param}); // PATCHED'
                  content = content[:brace_pos+1] + early + content[brace_pos+1:]
                  with open(sdk_js, 'w') as f:
                      f.write(content)
                  print(f"PATCH1 OK: validatePath({param}) → early return ok in {sdk_js}")
              else:
                  print(f"PATCH1 WARN: validatePath not found in {sdk_js}")

          # === PATCH 2: checksum/regenerate prompt in build.js ===
          # Find file containing the "No checksum file" message
          result = subprocess.run(
              ['grep', '-rl', 'No checksum', f'{npm_root}/@bubblewrap/'],
              capture_output=True, text=True
          )
          checksum_files = [f for f in result.stdout.strip().split('\n') if f]
          print(f"Checksum prompt files: {checksum_files}")

          for filepath in checksum_files:
              with open(filepath) as f:
                  content = f.read()

              # Show relevant lines for diagnostics
              for i, line in enumerate(content.split('\n'), 1):
                  if any(kw in line for kw in ['checksum', 'verifyChecksum', 'regenerate', 'No checksum']):
                      print(f"  L{i}: {line[:160]}")

              patched = content

              # Strategy A: find `if (!(await x.verifyChecksum()))` and make it `if (true)`
              patched_a = re.sub(
                  r'if\s*\(\s*!\s*\(?\s*await\s+\w+\.verifyChecksum\s*\(\s*\)\s*\)?\s*\)',
                  'if (true) /* PATCHED: always regenerate */',
                  patched
              )
              if patched_a != patched:
                  print("PATCH2A OK: replaced verifyChecksum check with if(true)")
                  patched = patched_a

              # Strategy B: find prompt call assigned to variable and make it auto-true
              # Pattern: const { varname } = await something.prompt([...])
              # Find the variable name used in the prompt result
              prompt_match = re.search(
                  r'const\s*\{\s*(\w+)\s*\}\s*=\s*await\s+\w+\.prompt\s*\(',
                  patched
              )
              if prompt_match:
                  var_name = prompt_match.group(1)
                  print(f"PATCH2B: found prompt var '{var_name}', replacing with auto-true")
                  # Replace: const { var } = await something.prompt([...]);
                  # With:    const { var } = { var: true }; // PATCHED
                  patched = re.sub(
                      r'const\s*\{\s*' + re.escape(var_name) + r'\s*\}\s*=\s*await\s+[^;]+;',
                      f'const {{{var_name}}} = {{{var_name}: true}}; // PATCHED: auto-yes',
                      patched,
                      count=1
                  )
                  print(f"PATCH2B OK: auto-replaced prompt call for '{var_name}'")
              else:
                  print("PATCH2B WARN: could not find prompt assignment pattern")

              if patched != content:
                  with open(filepath, 'w') as f:
                      f.write(patched)
                  print(f"File patched: {filepath}")
              else:
                  print(f"No patches applied to {filepath}")

          print("Done patching")
          PYEOF
      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          echo "Config: $(cat ~/.bubblewrap/config.json)"
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          printf '%s' '{"packageId":"ai.gambeta.app","host":"gambeta.ai","name":"gambeta.ai","launcherName":"gambeta.ai","display":"standalone","themeColor":"#00c853","navigationColor":"#0a0f0a","navigationColorDark":"#0a0f0a","backgroundColor":"#0a0f0a","startUrl":"/","iconUrl":"https://gambeta.ai/favicon-512.png","maskableIconUrl":"https://gambeta.ai/favicon-512.png","splashScreenFadeOutDuration":300,"signingKey":{"path":"../android.keystore","alias":"gambeta"},"minSdkVersion":21,"targetSdkVersion":34,"appVersion":"1.0.0","appVersionCode":1,"orientation":"portrait","enableNotifications":false,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://gambeta.ai/manifest.json","fallbackType":"customtabs","features":{},"alphaDependencies":{"enabled":false},"enableSiteSettingsShortcut":true,"isChromeOSOnly":false,"isMetaQuest":false,"fullScopeUrl":"https://gambeta.ai/","fingerprints":[]}' > twa-build/twa-manifest.json
      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Use expect to handle any remaining interactive prompts (keystore password, etc.)
          python3 << 'PYEOF'
          import os
          script = r"""#!/usr/bin/expect -f
set timeout 600
set store_pass [lindex $argv 0]
set key_pass [lindex $argv 1]
set pass_count 0
spawn bubblewrap build --skipPwaValidation
expect {
    -re {Y/n} { send "y\r"; exp_continue }
    -re {y/N} { send "y\r"; exp_continue }
    -re {[Pp]assword} {
        incr pass_count
        if {$pass_count == 1} {
            send "$store_pass\r"
        } else {
            send "$key_pass\r"
        }
        exp_continue
    }
    eof
}
catch wait result
exit [lindex $result 3]
"""
          with open('/tmp/build.exp', 'w') as f:
              f.write(script)
          os.chmod('/tmp/build.exp', 0o755)
          PYEOF
          /tmp/build.exp "$BUBBLEWRAP_KEYSTORE_PASSWORD" "$BUBBLEWRAP_KEY_PASSWORD"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
