name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Fix Android SDK structure for Bubblewrap
        run: |
          ANDROID_SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "=== Android SDK contents ==="
          ls "$ANDROID_SDK/" 2>/dev/null
          echo "=== cmdline-tools ==="
          ls "$ANDROID_SDK/cmdline-tools/" 2>/dev/null || echo "(missing)"
          echo "=== platform-tools/adb ==="
          ls "$ANDROID_SDK/platform-tools/adb" 2>/dev/null || echo "(missing)"
          # Bubblewrap needs cmdline-tools/latest/bin/sdkmanager
          # Create the 'latest' symlink if it doesn't exist
          if [ ! -d "$ANDROID_SDK/cmdline-tools/latest" ]; then
            LATEST_VERSION=$(ls "$ANDROID_SDK/cmdline-tools/" 2>/dev/null | grep -v latest | sort -V | tail -1)
            if [ -n "$LATEST_VERSION" ]; then
              ln -sfn "$ANDROID_SDK/cmdline-tools/$LATEST_VERSION" "$ANDROID_SDK/cmdline-tools/latest"
              echo "Created symlink: cmdline-tools/latest -> $LATEST_VERSION"
            fi
          fi
          echo "=== sdkmanager path ==="
          find "$ANDROID_SDK" -name sdkmanager 2>/dev/null | head -5
      - name: Pre-configure Bubblewrap (skip JDK/SDK interactive prompts)
        run: |
          mkdir -p ~/.bubblewrap
          JAVA_PATH="${JAVA_HOME}"
          ANDROID_PATH="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_PATH" "$ANDROID_PATH" \
            > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          cat > twa-build/twa-manifest.json << 'JSONEOF'
          {
            "packageId": "ai.gambeta.app",
            "host": "gambeta.ai",
            "name": "gambeta.ai",
            "launcherName": "gambeta.ai",
            "display": "standalone",
            "themeColor": "#00c853",
            "navigationColor": "#0a0f0a",
            "navigationColorDark": "#0a0f0a",
            "backgroundColor": "#0a0f0a",
            "startUrl": "/",
            "iconUrl": "https://gambeta.ai/favicon-512.png",
            "maskableIconUrl": "https://gambeta.ai/favicon-512.png",
            "splashScreenFadeOutDuration": 300,
            "signingKey": {"path": "../android.keystore", "alias": "gambeta"},
            "minSdkVersion": 21,
            "targetSdkVersion": 34,
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "orientation": "portrait",
            "enableNotifications": false,
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://gambeta.ai/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": {"enabled": false},
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://gambeta.ai/",
            "fingerprints": []
          }
          JSONEOF
      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
