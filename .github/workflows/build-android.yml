name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Setup Android SDK and accept licenses
        run: |
          ANDROID_SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "=== Android SDK: $ANDROID_SDK ==="
          if [ ! -d "$ANDROID_SDK/cmdline-tools/latest" ]; then
            LATEST=$(ls "$ANDROID_SDK/cmdline-tools/" 2>/dev/null | grep -v latest | sort -V | tail -1)
            [ -n "$LATEST" ] && ln -sfn "$ANDROID_SDK/cmdline-tools/$LATEST" "$ANDROID_SDK/cmdline-tools/latest"
          fi
          SDKMANAGER="$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager"
          echo "=== sdkmanager version ==="
          JAVA_HOME="$JAVA_HOME" "$SDKMANAGER" --version 2>&1 || echo "sdkmanager failed"
          echo "=== Accepting licenses ==="
          yes | JAVA_HOME="$JAVA_HOME" "$SDKMANAGER" --licenses 2>&1 || true
      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "${ANDROID_HOME:-/usr/local/lib/android/sdk}" > ~/.bubblewrap/config.json
          echo "Config: $(cat ~/.bubblewrap/config.json)"
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          cat > twa-build/twa-manifest.json << 'JSONEOF'
          {"packageId":"ai.gambeta.app","host":"gambeta.ai","name":"gambeta.ai","launcherName":"gambeta.ai","display":"standalone","themeColor":"#00c853","navigationColor":"#0a0f0a","navigationColorDark":"#0a0f0a","backgroundColor":"#0a0f0a","startUrl":"/","iconUrl":"https://gambeta.ai/favicon-512.png","maskableIconUrl":"https://gambeta.ai/favicon-512.png","splashScreenFadeOutDuration":300,"signingKey":{"path":"../android.keystore","alias":"gambeta"},"minSdkVersion":21,"targetSdkVersion":34,"appVersion":"1.0.0","appVersionCode":1,"orientation":"portrait","enableNotifications":false,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://gambeta.ai/manifest.json","fallbackType":"customtabs","features":{},"alphaDependencies":{"enabled":false},"enableSiteSettingsShortcut":true,"isChromeOSOnly":false,"isMetaQuest":false,"fullScopeUrl":"https://gambeta.ai/","fingerprints":[]}
          JSONEOF
      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
