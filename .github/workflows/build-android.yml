name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Setup Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>&1 | tail -5
      - name: Patch bubblewrap JS
        run: |
          python3 << 'PYEOF'
          import subprocess, glob, re

          npm_root = subprocess.check_output(['npm', 'root', '-g']).decode().strip()
          print(f"npm root: {npm_root}")

          # === PATCH 1: AndroidSdkTools.validatePath — bypass SDK validation ===
          sdk_files = glob.glob(f"{npm_root}/@bubblewrap/**/*AndroidSdkTools.js", recursive=True)
          for sdk_js in sdk_files:
              with open(sdk_js) as f:
                  content = f.read()
              match = re.search(r'static async validatePath\s*\((\w+)\)\s*\{', content)
              if match:
                  param = match.group(1)
                  brace_pos = match.end() - 1
                  content = content[:brace_pos+1] + f'\n        return Result_1.Result.ok({param}); // PATCHED' + content[brace_pos+1:]
                  with open(sdk_js, 'w') as f:
                      f.write(content)
                  print(f"PATCH1 OK: validatePath({param}) in {sdk_js}")
              else:
                  print(f"PATCH1 WARN: validatePath not found")

          # === PATCH 2: Find verifyChecksum — the REAL checksum logic file ===
          result = subprocess.run(
              ['grep', '-rl', 'verifyChecksum', f'{npm_root}/@bubblewrap/'],
              capture_output=True, text=True
          )
          verify_files = [f for f in result.stdout.strip().split('\n') if f and f.endswith('.js')]
          print(f"\nFiles with verifyChecksum: {verify_files}")

          for filepath in verify_files:
              with open(filepath) as f:
                  content = f.read()
              print(f"\n=== {filepath} ===")
              for i, line in enumerate(content.split('\n'), 1):
                  if 'verifyChecksum' in line or 'checksum' in line.lower() or 'prompt' in line:
                      print(f"  L{i}: {line[:200]}")

              patched = content

              # Patch A: make verifyChecksum() always return false (trigger regeneration)
              m = re.search(r'(async verifyChecksum\s*\([^)]*\)\s*\{)', patched)
              if m:
                  brace_pos = m.end() - 1
                  patched = patched[:brace_pos+1] + ' return false; /* PATCHED: force regen */ ' + patched[brace_pos+1:]
                  print(f"PATCH2A OK: verifyChecksum → always false")

              # Patch B: auto-answer the Y/n prompt with true
              # Pattern: const {varname} = await x.prompt([...])
              pm = re.search(r'const\s*\{\s*(\w+)\s*\}\s*=\s*await\s+\w+\.prompt\s*\(', patched)
              if pm:
                  var_name = pm.group(1)
                  patched = re.sub(
                      r'const\s*\{\s*' + re.escape(var_name) + r'\s*\}\s*=\s*await\s+[^;]+;',
                      f'const {{{var_name}}} = {{{var_name}: true}}; /* PATCHED: auto-yes */',
                      patched,
                      count=1
                  )
                  print(f"PATCH2B OK: auto-yes for prompt var '{var_name}'")
              else:
                  print(f"PATCH2B WARN: prompt assignment not found in {filepath}")

              if patched != content:
                  with open(filepath, 'w') as f:
                      f.write(patched)
                  print(f"File saved: {filepath}")
              else:
                  print(f"No changes in {filepath}")

          print("\nAll patches done")
          PYEOF
      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          echo "Config: $(cat ~/.bubblewrap/config.json)"
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          printf '%s' '{"packageId":"ai.gambeta.app","host":"gambeta.ai","name":"gambeta.ai","launcherName":"gambeta.ai","display":"standalone","themeColor":"#00c853","navigationColor":"#0a0f0a","navigationColorDark":"#0a0f0a","backgroundColor":"#0a0f0a","startUrl":"/","iconUrl":"https://gambeta.ai/favicon-512.png","maskableIconUrl":"https://gambeta.ai/favicon-512.png","splashScreenFadeOutDuration":300,"signingKey":{"path":"../android.keystore","alias":"gambeta"},"minSdkVersion":21,"targetSdkVersion":34,"appVersion":"1.0.0","appVersionCode":1,"orientation":"portrait","enableNotifications":false,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://gambeta.ai/manifest.json","fallbackType":"customtabs","features":{},"alphaDependencies":{"enabled":false},"enableSiteSettingsShortcut":true,"isChromeOSOnly":false,"isMetaQuest":false,"fullScopeUrl":"https://gambeta.ai/","fingerprints":[]}' > twa-build/twa-manifest.json
      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
