name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
      - name: Inspect and patch bubblewrap SDK validation
        run: |
          NPM_ROOT=$(npm root -g)
          echo "=== npm root: $NPM_ROOT ==="
          ls "$NPM_ROOT/@bubblewrap/" 2>/dev/null || true
          echo ""
          echo "=== bubblewrap build flags ==="
          bubblewrap build --help 2>&1 | head -60 || true
          echo ""
          SDK_JS=$(find "$NPM_ROOT/@bubblewrap" -name "AndroidSdkTools.js" 2>/dev/null | head -1)
          echo "=== AndroidSdkTools.js: $SDK_JS ==="
          cat "$SDK_JS" 2>/dev/null || true
          echo ""
          CONFIG_JS=$(find "$NPM_ROOT/@bubblewrap" -name "Config.js" 2>/dev/null | head -1)
          echo "=== Config.js: $CONFIG_JS ==="
          cat "$CONFIG_JS" 2>/dev/null || true
      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          echo "Config: $(cat ~/.bubblewrap/config.json)"
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          printf '%s' '{"packageId":"ai.gambeta.app","host":"gambeta.ai","name":"gambeta.ai","launcherName":"gambeta.ai","display":"standalone","themeColor":"#00c853","navigationColor":"#0a0f0a","navigationColorDark":"#0a0f0a","backgroundColor":"#0a0f0a","startUrl":"/","iconUrl":"https://gambeta.ai/favicon-512.png","maskableIconUrl":"https://gambeta.ai/favicon-512.png","splashScreenFadeOutDuration":300,"signingKey":{"path":"../android.keystore","alias":"gambeta"},"minSdkVersion":21,"targetSdkVersion":34,"appVersion":"1.0.0","appVersionCode":1,"orientation":"portrait","enableNotifications":false,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://gambeta.ai/manifest.json","fallbackType":"customtabs","features":{},"alphaDependencies":{"enabled":false},"enableSiteSettingsShortcut":true,"isChromeOSOnly":false,"isMetaQuest":false,"fullScopeUrl":"https://gambeta.ai/","fingerprints":[]}' > twa-build/twa-manifest.json
      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          EXTRA=""
          bubblewrap build --help 2>&1 | grep -q "skip-sdk-setup" && EXTRA="--skip-sdk-setup"
          echo "Running: bubblewrap build --skipPwaValidation $EXTRA"
          bubblewrap build --skipPwaValidation $EXTRA
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
