name: Build Android TWA
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/build-android.yml']
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli
      - name: Restore keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore
      - name: Setup Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses >/dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" 2>&1 | tail -5
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls "$JAVA_HOME/bin/java" && echo "java binary OK" || echo "java binary MISSING"
          ls "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" && echo "sdkmanager OK" || echo "sdkmanager MISSING"
          ls "$ANDROID_HOME/platform-tools/adb" && echo "adb OK" || echo "adb MISSING"
      - name: Patch bubblewrap SDK validation
        run: |
          NPM_ROOT=$(npm root -g)
          echo "npm root: $NPM_ROOT"
          SDK_JS="$NPM_ROOT/@bubblewrap/cli/node_modules/@bubblewrap/core/dist/lib/androidSdk/AndroidSdkTools.js"
          echo "AndroidSdkTools.js: $SDK_JS"
          ls "$SDK_JS" && echo "file exists" || echo "FILE MISSING"
          python3 << 'PYEOF'
          import subprocess, os, re, glob, sys

          npm_root = subprocess.check_output(['npm', 'root', '-g']).decode().strip()
          sdk_files = glob.glob(f"{npm_root}/@bubblewrap/**/*AndroidSdkTools.js", recursive=True)
          print(f"Found AndroidSdkTools files: {sdk_files}")

          for sdk_js in sdk_files:
              print(f"\n=== Patching {sdk_js} ===")
              with open(sdk_js) as f:
                  content = f.read()

              # Determine the Result.ok() expression used in this file
              if 'Result_1.Result.ok' in content:
                  ok_call = 'Result_1.Result.ok(true)'
              elif 'exports.Result.ok' in content:
                  ok_call = 'exports.Result.ok(true)'
              else:
                  ok_call = 'Result.ok(true)'
              print(f"Using Result.ok expression: {ok_call}")

              # Show current validation-related lines for diagnostics
              print("Current validation lines:")
              for i, line in enumerate(content.split('\n'), 1):
                  if any(kw in line for kw in ['validateInstall', 'validateAndroid', 'isInstalled', 'sdkmanager', 'Result.error', 'Result.ok']):
                      print(f"  L{i}: {line[:160]}")

              # Patch strategy: find validateInstallation (or similar) and insert
              # early return at the start of the function body
              method_names = ['validateInstallation', 'validateAndroidSdk', 'isInstalled']
              patched = False

              for method in method_names:
                  if method not in content:
                      continue
                  idx = content.find(method)
                  # Find the opening brace of the function body
                  # It comes after the method name and parameter list
                  brace_idx = content.find('{', idx)
                  if brace_idx == -1:
                      continue
                  # Insert early return immediately after the opening brace
                  early_return = f' return Promise.resolve({ok_call}); '
                  new_content = content[:brace_idx + 1] + early_return + content[brace_idx + 1:]
                  with open(sdk_js, 'w') as f:
                      f.write(new_content)
                  content = new_content
                  print(f"Patched method '{method}' - inserted early return Promise.resolve({ok_call})")
                  patched = True
                  break

              if not patched:
                  print("WARNING: No known validation method found to patch!")
                  print("Full file snippet (first 2000 chars):")
                  print(content[:2000])

          print("\nDone patching AndroidSdkTools.js")
          PYEOF
      - name: Pre-configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          echo "Config: $(cat ~/.bubblewrap/config.json)"
      - name: Create twa-manifest.json
        run: |
          mkdir -p twa-build
          printf '%s' '{"packageId":"ai.gambeta.app","host":"gambeta.ai","name":"gambeta.ai","launcherName":"gambeta.ai","display":"standalone","themeColor":"#00c853","navigationColor":"#0a0f0a","navigationColorDark":"#0a0f0a","backgroundColor":"#0a0f0a","startUrl":"/","iconUrl":"https://gambeta.ai/favicon-512.png","maskableIconUrl":"https://gambeta.ai/favicon-512.png","splashScreenFadeOutDuration":300,"signingKey":{"path":"../android.keystore","alias":"gambeta"},"minSdkVersion":21,"targetSdkVersion":34,"appVersion":"1.0.0","appVersionCode":1,"orientation":"portrait","enableNotifications":false,"generatorApp":"bubblewrap-cli","webManifestUrl":"https://gambeta.ai/manifest.json","fallbackType":"customtabs","features":{},"alphaDependencies":{"enabled":false},"enableSiteSettingsShortcut":true,"isChromeOSOnly":false,"isMetaQuest":false,"fullScopeUrl":"https://gambeta.ai/","fingerprints":[]}' > twa-build/twa-manifest.json
      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bubblewrap build --skipPwaValidation
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gambeta-android-app
          path: |
            **/*.apk
            **/*.aab
          retention-days: 30
