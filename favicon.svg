<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132b1a"/>
      <stop offset="100%" stop-color="#071209"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#7fffaa"/>
      <stop offset="55%" stop-color="#3dd668"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Fondo redondeado oscuro -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- Borde sutil -->
  <rect width="64" height="64" rx="13" fill="none" stroke="#1e4a28" stroke-width="1.5"/>
  <!-- Rayo con glow -->
  <path filter="url(#glow)"
    d="M34,4 L12,36 L27,36 L22,60 L52,26 L37,26 L42,4 Z"
    fill="url(#bolt)"/>
</svg>
