<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a4a28"/>
      <stop offset="100%" stop-color="#071209"/>
    </radialGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#e4e4e4"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </radialGradient>
    <radialGradient id="shin" cx="33%" cy="28%" r="28%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <clipPath id="c"><circle cx="32" cy="34" r="22"/></clipPath>
  </defs>
  <!-- Fondo redondeado verde oscuro -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>
  <!-- Bola base -->
  <circle cx="32" cy="34" r="22" fill="url(#ball)"/>
  <!-- Parches negros estilo fútbol clásico -->
  <g clip-path="url(#c)">
    <!-- Pentágono central superior -->
    <path d="M32,14 L39,19 L37,27 L27,27 L25,19 Z" fill="#1a1a1a"/>
    <!-- Parche derecho -->
    <path d="M44,28 L51,24 L53,33 L47,40 L40,36 Z" fill="#1a1a1a"/>
    <!-- Parche izquierdo -->
    <path d="M20,28 L13,24 L11,33 L17,40 L24,36 Z" fill="#1a1a1a"/>
    <!-- Parche inferior derecho -->
    <path d="M41,47 L32,52 L28,43 L36,38 L44,42 Z" fill="#1a1a1a"/>
    <!-- Parche inferior izquierdo -->
    <path d="M23,47 L32,52 L36,43 L28,38 L20,42 Z" fill="#1a1a1a"/>
    <!-- Líneas de costura sutiles -->
    <path d="M32,14 L39,19 M39,19 L37,27 M37,27 L27,27 M27,27 L25,19 M25,19 L32,14
             M37,27 L40,36 M40,36 L44,42 M27,27 L24,36 M24,36 L20,42
             M44,42 L41,47 M20,42 L23,47 M41,47 L32,52 M23,47 L32,52"
          fill="none" stroke="rgba(100,100,100,0.5)" stroke-width="0.6"/>
  </g>
  <!-- Brillo -->
  <ellipse cx="25" cy="25" rx="7" ry="5" fill="url(#shin)" opacity="0.8"/>
  <!-- Micro sombra inferior -->
  <ellipse cx="32" cy="57" rx="14" ry="3" fill="rgba(0,0,0,0.25)"/>
</svg>
