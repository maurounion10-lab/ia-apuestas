name = "gambeta-x-bot"
main = "index.js"
compatibility_date = "2026-05-01"

# BOT_MODE controla el comportamiento. Default "off" = seguro.
#   off  → no publica nada
#   dry  → genera los tweets pero NO publica (para la semana supervisada)
#   live → publica de verdad en X
# Se puede cambiar en el dashboard de Cloudflare sin redeploy.
[vars]
BOT_MODE = "live"

# Secrets (NO van acá — se cargan en el dashboard de Cloudflare):
#   X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_SECRET, TRIGGER_TOKEN

# Cron triggers (horario UTC; Argentina = UTC-3)
# Minutos irregulares a propósito — para que no parezca un bot programado
# a horas redondas. Igual es bot, pero no se nota tanto.
#   23 12 → 09:23 ART  resultados
#   30 12 → 09:30 ART  picks del día (todos los pendientes del día)
#   47 17 → 14:47 ART  educación
#   13 21 → 18:13 ART  hot take
#   23 23 → 20:23 ART  comunidad
#   17 *  → cada hora :17 → festejo de aciertos recién resueltos
[triggers]
crons = ["17 * * * *", "23 12 * * *", "30 12 * * *", "47 17 * * *", "13 21 * * *", "23 23 * * *"]

# Observability (Workers Logs) — Cloudflare lo tiene activado por defecto;
# declararlo acá mantiene el wrangler.toml sincronizado con el dashboard.
[observability]
enabled = true

# KV namespace para dedup de tweets (compartido con apuestas-api)
[[kv_namespaces]]
binding = "CACHE_KV"
id = "1d4b161e78db4de9a9b806f369c73ceb"
